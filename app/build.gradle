plugins {
    id "com.android.application"
}

def signingProperties = new Properties()
def signingPropertiesFile = rootProject.file("release-signing.properties")
if (signingPropertiesFile.exists()) {
    signingProperties.load(new FileInputStream(signingPropertiesFile))
}

android {
    namespace "com.openzen.heyboxcommunity"
    compileSdk 36

    defaultConfig {
        applicationId "com.openzen.heyboxcommunity"
        minSdk 14
        targetSdk 35
        versionCode 159
        versionName "1.59"
        buildConfigField "String", "RELEASE_CERT_SHA256",
                "\"7b163883d570408505d820174fb9565471efde8d863508fd390e4f4eb1645eb8\""
        buildConfigField "String", "UPDATE_API_URL",
                "\"https://api.github.com/repos/huanghao897/heybox-lite/releases/latest\""
        buildConfigField "String", "UPDATE_FALLBACK_URL",
                "\"https://github.com/huanghao897/heybox-lite/releases/latest\""
    }

    buildFeatures {
        buildConfig = true
    }

    signingConfigs {
        release {
            if (signingPropertiesFile.exists()) {
                storeFile rootProject.file(signingProperties["storeFile"])
                storePassword signingProperties["storePassword"]
                keyAlias signingProperties["keyAlias"]
                keyPassword signingProperties["keyPassword"]
            }
        }
    }

    buildTypes {
        release {
            debuggable = false
            minifyEnabled = true
            shrinkResources = true
            signingConfig = signingConfigs.release
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation "com.google.zxing:core:3.5.3"
}
